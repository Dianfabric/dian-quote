<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiAN 견적서 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;min-height:100vh}
.app{display:flex;min-height:100vh}

/* 폼 패널 */
.fp{width:50vw;min-width:460px;background:#fff;padding:24px 28px 60px;overflow-y:auto;border-right:1px solid #e0e0e0;box-shadow:2px 0 8px rgba(0,0,0,.06);transition:width .4s}
.fp.col{width:420px;min-width:420px}
.fp h1{font-size:19px;font-weight:700;color:#1a1a1a}
.sub{font-size:12px;color:#999;margin-bottom:20px;margin-top:3px}
.sec{margin-bottom:20px}
.sec-t{font-size:11px;font-weight:700;color:#666;letter-spacing:.8px;text-transform:uppercase;margin-bottom:9px;padding-bottom:5px;border-bottom:2px solid #f0f0f0}
.field{margin-bottom:9px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:3px;font-weight:500}
.field input,.field textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;background:#fafafa}
.field input:focus,.field textarea:focus{outline:none;border-color:#4A90D9;background:#fff;box-shadow:0 0 0 3px rgba(74,144,217,.1)}
.field textarea{resize:vertical;min-height:64px}
.frow{display:flex;gap:10px}
.frow .field{flex:1}

/* 담당자 */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.sb{padding:9px 10px;border:1.5px solid #e0e0e0;border-radius:8px;background:#fafafa;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.sb:hover{border-color:#4A90D9;background:#f0f6ff}
.sb.act{border-color:#1a1a2e;background:#1a1a2e;color:#fff}
.sb .sn{font-size:13px;font-weight:700;display:block}
.sb .sr{font-size:10px;opacity:.55}
.sb.act .sr{opacity:.7}
#scArea{margin-top:6px;display:none}

/* 품목 */
.ih{display:grid;grid-template-columns:22px 3fr 1fr 1fr 1fr 1fr 1fr 3fr 22px;gap:4px;margin-bottom:4px}
.ih span{font-size:10px;color:#999;font-weight:600;text-align:center}
.ir{display:grid;grid-template-columns:22px 3fr 1fr 1fr 1fr 1fr 1fr 3fr 22px;gap:4px;align-items:center;margin-bottom:5px;background:#fafafa;border-radius:7px;padding:7px 5px;border:1px solid #f0f0f0}
.inum{width:22px;height:22px;background:#e8ecf0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#666}
.ir input{width:100%;padding:6px 5px;border:1px solid #e0e0e0;border-radius:4px;font-size:11px;font-family:inherit;background:#fff;text-align:center}
.ir input.l{text-align:left}
.ir input:focus{outline:none;border-color:#4A90D9}
.delbtn{width:22px;height:22px;background:#fee2e2;border:none;border-radius:50%;cursor:pointer;color:#dc2626;font-size:14px;display:flex;align-items:center;justify-content:center}
.delbtn:hover{background:#fecaca}
.addbtn{width:100%;padding:8px;margin-top:4px;background:#f5f7fa;border:1px dashed #ccc;border-radius:6px;font-size:13px;font-family:inherit;color:#666;cursor:pointer}
.addbtn:hover{background:#e8f0fe;border-color:#4A90D9;color:#4A90D9}
.totbox{background:#1a1a2e;border-radius:8px;padding:13px 16px;margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.totbox .tl{color:#aaa;font-size:12px}
.totbox .tv{color:#fff;font-size:18px;font-weight:700}

/* 자동완성 */
.acw{position:relative}
.acl{position:absolute;top:100%;left:0;z-index:999;width:max-content;min-width:100%;max-width:440px;background:#fff;border:1px solid #4A90D9;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.15);display:none}
.acl div{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;gap:20px;white-space:nowrap}
.acl div:hover{background:#f0f6ff}
.acl div.ach{background:#e8f0fe;border-left:3px solid #4A90D9}
.acl .acload{color:#aaa;font-size:12px;padding:10px;text-align:center}

/* 단수정리 */
.rwrap{margin-top:10px;padding:12px 14px;border:1px solid #e0e0e0;border-radius:8px;background:#fafafa}
.rwrap .rt{font-size:11px;color:#888;font-weight:600;margin-bottom:8px}
.rbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.rbtn{padding:5px 12px;font-size:12px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-family:inherit;color:#555;transition:all .15s}
.rbtn:hover{border-color:#4A90D9;color:#4A90D9}
.rbtn.act{border-color:#1a1a2e;background:#1a1a2e;color:#fff}
.rres{font-size:13px;font-weight:700;color:#1a1a2e;padding:6px 10px;background:#f0f4ff;border-radius:6px;display:none;margin-top:4px}
.rcw{display:none;margin-top:6px}
.rcw input{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;background:#fff}

/* 버튼들 */
.genbtn{width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.genbtn:hover{transform:translateY(-1px)}

/* 미리보기 패널 */
.pp{flex:1;background:#e8eaed;display:flex;flex-direction:column;align-items:center;padding:32px 20px;overflow-y:auto}
.pp>h2{font-size:13px;color:#888;margin-bottom:20px;font-weight:500}
.ep{text-align:center;color:#bbb;margin-top:100px;font-size:14px;line-height:2}

/* 견적서 */
.qp{width:794px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.12);padding:52px 56px;font-family:'Malgun Gothic',sans-serif;font-size:13px}
.qph{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #111;padding-bottom:14px;margin-bottom:20px}
.qli{height:65px;width:auto}
.qtr{text-align:right}
.qtit{font-size:22px;letter-spacing:8px;color:#222;font-weight:400}
.qdat{font-size:11px;color:#888;margin-top:4px}
.qcow{border-top:1px solid #ddd;border-bottom:1px solid #ddd;padding:10px 0;margin-bottom:20px}
.qco{font-size:10px;color:#555;line-height:1.9}
.qcr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px}
.qcli{font-size:20px;font-weight:700;color:#111}
.qsi{text-align:right;font-size:11px;color:#555;line-height:1.9}
.qir{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid #111;border-bottom:1px solid #ccc;margin-bottom:14px}
.qib{padding:8px 14px;border-right:1px solid #e0e0e0;font-size:12px}
.qib:last-child{border-right:none}
.qib .ql{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:2px}
.qib .qv{color:#222;font-size:12px}
.qtb{border:1px solid #111;padding:11px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.qtb .tl{font-size:12px;color:#555}
.qtb .tv{font-size:15px;font-weight:700;color:#111}
.qtb .tk{font-size:11px;color:#777;font-weight:400;margin-left:8px}
.qnap{font-size:11px;color:#aaa;margin-bottom:14px}
.qtable{width:100%;border-collapse:collapse;margin-bottom:16px}
.qtable th{border-top:1px solid #111;border-bottom:1px solid #111;padding:9px 6px;text-align:center;font-size:11px;font-weight:700;color:#333}
.qtable td{padding:10px 6px;text-align:center;font-size:12px;border-bottom:1px solid #eee;color:#222}
.qtable .trow td{border-top:1px solid #111;border-bottom:1px solid #111;font-weight:700;font-size:13px;color:#111}
.qtable td.tl{text-align:left;padding-left:10px}
.qrem{margin-top:14px;border-top:1px solid #eee;padding-top:10px}
.qrem .rt{font-size:10px;font-weight:700;color:#aaa;margin-bottom:5px;letter-spacing:1px}
.qrem p{font-size:11px;color:#555;line-height:1.9}
.qbank{text-align:center;margin-top:20px;font-size:11px;color:#999;border-top:1px solid #eee;padding-top:12px}
.dlbtns{display:flex;gap:10px;margin-top:16px}
.dlbtn{flex:1;padding:12px 20px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
.dlbtn.pdf{background:#1a1a2e;color:#fff}
.dlbtn.jpg{background:#fff;color:#1a1a2e;border:2px solid #1a1a2e}
.dlbtn:hover{transform:translateY(-1px)}
.dlbtn:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* 불러오기 오버레이 */
.lov{position:fixed;top:0;right:-440px;width:420px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.15);z-index:1000;transition:right .3s;display:flex;flex-direction:column;overflow:hidden}
.lov.open{right:0}
.lovh{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid #eee;background:#f8f9fa;flex-shrink:0}
.lovh span{font-size:14px;font-weight:700;color:#333}
.lovh button{background:none;border:none;font-size:18px;cursor:pointer;color:#888;padding:2px 8px}
.lovbg{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.2);z-index:999;display:none}
.lovbg.open{display:block}
.lovbody{flex:1;overflow-y:auto;padding:12px 14px}
.lsearch{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:12px}
.lgroup{margin-bottom:8px;border:1px solid #eee;border-radius:8px;overflow:hidden}
.lghead{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#f5f5f5;cursor:pointer;user-select:none}
.lghead span:first-child{font-size:12px;font-weight:700;color:#444}
.lghead span:last-child{font-size:11px;color:#888}
.lgbody{display:none}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;background:#fafafa;cursor:pointer;user-select:none;border-top:1px solid #f0f0f0}
.mhead span:first-child{font-size:11px;font-weight:600;color:#777}
.mhead span:last-child{font-size:11px;color:#aaa}
.mbody{display:none}
.sitem{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid #f5f5f5}
.sitem:hover{background:#f8fbff}
.sin{flex:1;min-width:0}
.sin .sn{font-size:12px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sin .sd{font-size:10px;color:#aaa;margin-top:1px}
.sibtns{display:flex;gap:4px;flex-shrink:0}
.lbtn{padding:4px 10px;font-size:11px;background:#f0f6ff;border:1px solid #4A90D9;border-radius:4px;color:#4A90D9;cursor:pointer;font-family:inherit}
.lbtn:hover{background:#4A90D9;color:#fff}
.dsbtn{padding:4px 8px;font-size:11px;background:#fff5f5;border:1px solid #fca5a5;border-radius:4px;color:#dc2626;cursor:pointer;font-family:inherit}
.dsbtn:hover{background:#dc2626;color:#fff}
.sempty{text-align:center;color:#bbb;font-size:12px;padding:20px 0}
.ltabs{display:flex;border-bottom:2px solid #eee;margin-bottom:12px}
.ltab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.ltab.act{color:#1a1a2e;border-bottom-color:#1a1a2e}
.ltab-body{display:none}
.ltab-body.act{display:block}
.gdrive-file{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid #eee;border-radius:6px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.gdrive-file:hover{background:#f0f6ff;border-color:#4A90D9}
.gdrive-file .gfn{font-size:12px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.gdrive-file .gfd{font-size:10px;color:#aaa;margin-top:2px}
.gdrive-load-btn{padding:4px 10px;font-size:11px;background:#f0f6ff;border:1px solid #4A90D9;border-radius:4px;color:#4A90D9;cursor:pointer;font-family:inherit;flex-shrink:0}
.gdrive-load-btn:hover{background:#4A90D9;color:#fff}

/* 토스트 */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.gdrive-btn{padding:4px 10px;font-size:11px;font-weight:700;background:#fff;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-family:inherit;color:#444;white-space:nowrap;display:flex;align-items:center;gap:5px}
.gdrive-btn.connected{border-color:#34a853;color:#34a853;background:#f0fff4}
.gdrive-btn svg{width:14px;height:14px}

/* 모바일 */
@media(max-width:768px){
  .app{flex-direction:column}
  .fp{width:100%!important;min-width:unset!important;padding:20px 16px 40px;border-right:none;border-bottom:2px solid #e0e0e0}
  .fp.col{width:100%!important;min-width:unset!important}
  .pp{padding:20px 8px}
  .frow{flex-direction:column}
  .sg{grid-template-columns:1fr 1fr}
  .ih{display:none!important}
  .ih{display:none!important}
  .ir{display:block!important;padding:12px;border-radius:12px;margin-bottom:12px;border:1px solid #e0e0e0;background:#fff}
  /* 1줄: 번호 + 원단명(크게) + 삭제 */
  .ir-row1{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .ir-row1 .inum{width:24px;height:24px;background:#e8ecf0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#666;flex-shrink:0}
  .ir-row1 .acw{flex:1}
  .ir-row1 .acw input{width:100%;font-size:14px;padding:9px 10px;border:1px solid #e0e0e0;border-radius:6px;font-family:inherit;background:#fafafa}
  /* 구분선 */
  .ir-sep{border:none;border-top:1px solid #f0f0f0;margin:0 0 8px}
  /* 2x2 그리드: 색상|규격 / 수량|단위 */
  .ir-row2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
  /* 2x2 그리드: 단가|비고 */
  .ir-row3{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .ir-row2>div,.ir-row3>div{display:flex;flex-direction:column}
  .ir-row2 input,.ir-row3 input{width:100%;padding:8px 10px;border:1px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit;background:#fafafa;box-sizing:border-box}
  .ir-lbl{font-size:10px;color:#aaa;margin-bottom:3px}
  #previewArea{width:100%;overflow-x:auto}
  .qp{width:794px!important;min-width:794px}
  .dlbtns{flex-direction:column}
  #toggleBtn{display:none}
  .lov{width:100%;right:-100%}
  .lov.open{right:0}
}
</style>
</head>
<body>
<div class="app">

<!-- 폼 패널 -->
<div class="fp" id="formPanel">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
    <h1>📄 DiAN 견적서 생성기</h1>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
      <button onclick="togglePanel()" id="toggleBtn" style="padding:4px 10px;font-size:11px;background:#f0f0f0;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-family:inherit;color:#555;white-space:nowrap">◀ 접기</button>
      <button onclick="saveQuote(false)" style="padding:4px 10px;font-size:11px;font-weight:700;background:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-family:inherit;color:#fff;white-space:nowrap">💾 저장</button>
      <button onclick="openLoad()" style="padding:4px 10px;font-size:11px;font-weight:700;background:#f0f6ff;border:1px solid #4A90D9;border-radius:6px;cursor:pointer;font-family:inherit;color:#4A90D9;white-space:nowrap">📂 불러오기</button>
      <button class="gdrive-btn" id="gdriveBtn" onclick="gdriveLogin()">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4.5 19.5l3-5.5H22l-3 5.5H4.5z" fill="#34a853"/><path d="M2 19.5L8.5 8l3.5 6H5L2 19.5z" fill="#4285f4"/><path d="M8.5 8L15 8l7 12H15.5L8.5 8z" fill="#fbbc05"/></svg>
        드라이브 연동
      </button>
    </div>
  </div>
  <p class="sub">변수를 입력하면 자동으로 견적서가 완성됩니다</p>

  <!-- 기본 정보 -->
  <div class="sec">
    <div class="sec-t">📅 기본 정보</div>
    <div class="field"><label>견적일</label><input type="text" id="quoteDate"/></div>
    <div class="field"><label>수신처 (고객사명)</label><input type="text" id="clientName" placeholder="예: 코웨이"/></div>
  </div>

  <!-- DiAN 담당자 -->
  <div class="sec">
    <div class="sec-t">🙋 DiAN 담당자</div>
    <div class="sg" id="staffGrid">
      <button type="button" class="sb" onclick="selStaff('유대현','과장','010-6487-9373',this)"><span class="sn">유대현 과장</span><span class="sr">010-6487-9373</span></button>
      <button type="button" class="sb" onclick="selStaff('한태원','사장','010-4466-2115',this)"><span class="sn">한태원 사장</span><span class="sr">010-4466-2115</span></button>
      <button type="button" class="sb" onclick="selStaff('한태종','부장','010-2085-8963',this)"><span class="sn">한태종 부장</span><span class="sr">010-2085-8963</span></button>
      <button type="button" class="sb" onclick="selStaff('최현진','팀장','010-9259-3580',this)"><span class="sn">최현진 팀장</span><span class="sr">010-9259-3580</span></button>
      <button type="button" class="sb" onclick="selStaff('전새로미','사원','010-4383-2115',this)"><span class="sn">전새로미 사원</span><span class="sr">010-4383-2115</span></button>
      <button type="button" class="sb" id="custBtn" onclick="selStaff('','','',this)"><span class="sn">기타 (직접 입력)</span><span class="sr">이름 · 직책 · 연락처</span></button>
    </div>
    <div id="staffSel" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border:1.5px solid #1a1a2e;border-radius:8px;background:#f8f9ff">
        <div><span id="selName" style="font-size:14px;font-weight:700;color:#1a1a2e"></span><span id="selTel" style="font-size:12px;color:#666;margin-left:10px"></span></div>
        <button onclick="deselStaff()" style="font-size:11px;color:#999;background:none;border:none;cursor:pointer;padding:2px 6px">✕ 변경</button>
      </div>
    </div>
    <div id="scArea" style="display:none;margin-top:6px">
      <div class="frow">
        <div class="field"><label>이름</label><input type="text" id="cName" oninput="syncCust()"/></div>
        <div class="field"><label>직책</label><input type="text" id="cRole" oninput="syncCust()"/></div>
        <div class="field"><label>연락처</label><input type="text" id="cTel" oninput="syncCust()"/></div>
      </div>
    </div>
  </div>

  <!-- 수신 담당자 -->
  <div class="sec">
    <div class="sec-t">👤 수신 담당자</div>
    <div class="frow">
      <div class="field"><label>담당자명</label><input type="text" id="attn" placeholder="예: 000 과장님"/></div>
      <div class="field"><label>전화번호</label><input type="text" id="clientTel" placeholder="010-0000-0000"/></div>
    </div>
  </div>

  <!-- 납품 정보 -->
  <div class="sec">
    <div class="sec-t">📦 납품 정보</div>
    <div class="field"><label>현장명</label><input type="text" id="siteName" placeholder="현장명"/></div>
  </div>

  <!-- 품목 -->
  <div class="sec">

// 폴더 찾기 또는 생성 (공유드라이브 지원)
async function gdriveGetFolder(folderName, parentId) {
  var q = "name='" + folderName + "' and mimeType='application/vnd.google-apps.folder' and trashed=false and '" + parentId + "' in parents";
  var res = await fetch(
    'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) +
    '&fields=files(id,name)&includeItemsFromAllDrives=true&supportsAllDrives=true',
    { headers: { Authorization: 'Bearer ' + _gToken } }
  );
  var data = await res.json();
  if (data.files && data.files.length > 0) return data.files[0].id;
  // 없으면 생성
  var meta = { name: folderName, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] };
  var cr = await fetch('https://www.googleapis.com/drive/v3/files?supportsAllDrives=true', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + _gToken, 'Content-Type': 'application/json' },
    body: JSON.stringify(meta)
  });
  var cf = await cr.json();
  return cf.id;
}

// 드라이브에 파일 업로드
async function gdriveSaveFile(blob, fileName, mimeType) {
  if (!_gToken) return;
  try {
    // [디안]업무문서 → 견적서 모음 → 담당자 폴더 → 파일
    var quoteFolder = await gdriveGetFolder('견적서 모음', DIAN_FOLDER_ID);
    var staffName = (_sN + ' ' + _sR).trim() || '미지정';
    var staffId = await gdriveGetFolder(staffName, quoteFolder);
    // 파일 업로드
    var meta = JSON.stringify({ name: fileName, parents: [staffId] });
    var form = new FormData();
    form.append('metadata', new Blob([meta], {type:'application/json'}));
    form.append('file', blob);
    var res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + _gToken },
      body: form
    });
    var data = await res.json();
    if (res.ok) toast('드라이브에 저장됐어요! ☁️');
    else { console.error(data); toast('드라이브 저장 실패: ' + (data.error&&data.error.message||'')); }
  } catch(e) {
    console.error(e); toast('드라이브 오류: ' + e.message);
  }
}

// Sheets
function loadFabric(){
  if(_fData) return Promise.resolve(_fData);
  var url='https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/'+encodeURIComponent('쇼룸단가표!A2:F')+'?key='+API_KEY;
  console.log('[DiAN] 원단 로딩...');
  return new Promise(function(resolve){
    var x=new XMLHttpRequest();
    x.open('GET',url,true);
    x.onload=function(){
      if(x.status===200){
        try{
          var d=JSON.parse(x.responseText);
          _fData={};
          (d.values||[]).forEach(function(row){
            var n=(row[0]||'').trim();
            var p=(row[1]||'').toString().replace(/,/g,'').trim();
            var s=(row[3]||'').toString().trim();
            var a=(row[5]||'').trim();
            if(n){
              var e={name:n,price:p,spec:s?s+'mm':'1400mm',alias:a};
              _fData[n.toUpperCase()]=e;
              if(a) _fData[a.toUpperCase()]=e;
            }
          });
          console.log('[DiAN] 완료! '+Object.keys(_fData).length+'개');
          resolve(_fData);
        }catch(e){console.error(e);resolve({});}
      }else{console.error('API오류',x.status);resolve({});}
    };
    x.onerror=function(){console.error('네트워크오류');resolve({});};
    x.send();
  });
}

function delItem(id){
  var el=document.getElementById(id);

function renum(){
  document.querySelectorAll('.ir').forEach(function(r,i){
    r.querySelector('.inum').textContent=i+1;
  });
}
function calcTot(){
  var sub=0;
  document.querySelectorAll('.ir').forEach(function(r){
    var inp=r.querySelectorAll('input');
    // inp[3]=수량, inp[5]=단가 (PC), 모바일도 동일 순서
    sub+=(parseFloat(inp[3].value)||0)*(parseFloat(inp[5].value)||0);
  });
  var raw=sub+Math.round(sub*.1);
  var g=applyRound(raw);
  document.getElementById('totDisp').textContent='₩'+g.toLocaleString();
  var res=document.getElementById('rres');
  if(_rMode!=='none'&&g!==raw){
    res.style.display='block';
    var diff=g-raw;
    res.textContent=raw.toLocaleString()+'원 → '+g.toLocaleString()+'원 ('+(diff>=0?'+':'')+diff.toLocaleString()+'원)';
  }else{res.style.display='none';}
}
function getRows(){
  var rows=[], no=1;
  document.querySelectorAll('.ir').forEach(function(r){
    var inp=r.querySelectorAll('input');
    var n=inp[0].value.trim();
    if(!n) return;
    var col=inp[1].value.trim();
    var qty=parseFloat(inp[3].value)||0;
    var price=parseFloat(inp[5].value)||0;
    rows.push({
      no:no++,
      item:col?n+' '+col:n,
      spec:inp[2].value.trim()||'1400mm',
      qty:qty,
      unit:inp[4].value.trim()||'Y',
      price:price,
      amount:qty*price,
      remark:inp[6].value.trim()
    });
  });
  return rows;
}

// 단수정리
function setRound(m,btn){
  _rMode=m;
  document.querySelectorAll('.rbtn').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  document.getElementById('rcw').style.display=m==='custom'?'block':'none';
  calcTot();
}
function applyRound(g){
  if(_rMode==='1000') return Math.round(g/1000)*1000;
  if(_rMode==='10000') return Math.round(g/10000)*10000;
  if(_rMode==='custom'){
    var v=parseFloat(document.getElementById('rcInput').value);
    return isNaN(v)?g:v;
  }
  return g;
}

// 자동완성
function onAcInput(inp){
  var wrap=inp.parentNode;
  var dd=wrap.querySelector('.acl');
  var kw=inp.value.trim();
  if(!kw){dd.style.display='none';return;}
  dd.innerHTML='<div class="acload">검색 중...</div>';
  dd.style.display='block';
  loadFabric().then(function(data){
    var ku=kw.toUpperCase(), sw=[], inc=[];
    Object.values(data).forEach(function(it){
      var already=sw.some(function(x){return x.name===it.name;})||inc.some(function(x){return x.name===it.name;});
      if(already) return;
      var nu=it.name.toUpperCase(), au=it.alias?it.alias.toUpperCase():'';
      if(nu.includes(ku)||au.includes(ku)){
        (nu.startsWith(ku)||au.startsWith(ku)?sw:inc).push(it);
      }
    });
    var uniq=sw.concat(inc).slice(0,10);
    if(!uniq.length){dd.style.display='none';return;}
    dd.innerHTML='';
    uniq.forEach(function(it){
      var d=document.createElement('div');
      d.innerHTML='<span style="font-weight:600">'+it.name+(it.alias?' ('+it.alias+')':'')+'</span>'+
        '<span style="color:#999;font-size:11px">'+it.spec+' | '+parseInt(it.price||0).toLocaleString()+'원/Y</span>';
      d.onmousedown=function(e){
        e.preventDefault();
        inp.value=it.name;
        var row=wrap.closest('.ir');
        var ins=row.querySelectorAll('input');
        ins[2].value=it.spec;
        ins[5].value=it.price;
        dd.style.display='none';
        calcTot();
      };
      dd.appendChild(d);
    });
  });
}
function onAcKey(inp,e){
  var wrap=inp.parentNode;
  var dd=wrap.querySelector('.acl');
  var items=dd.querySelectorAll('div:not(.acload)');
  if(!items.length||dd.style.display==='none') return;
  var cur=wrap.querySelector('.ach'), idx=-1;
  items.forEach(function(el,i){if(el===cur) idx=i;});
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(cur) cur.classList.remove('ach');
    var nx=items[idx+1]||items[0];
    nx.classList.add('ach');
    nx.scrollIntoView({block:'nearest'});
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(cur) cur.classList.remove('ach');
    var pv=items[idx-1]||items[items.length-1];
    pv.classList.add('ach');
    pv.scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(cur) cur.dispatchEvent(new MouseEvent('mousedown'));
  } else if(e.key==='Escape'){
    dd.style.display='none';
    if(cur) cur.classList.remove('ach');
  }
}

});

// 한글 금액
function numKor(n){
  if(n===0) return '영원정';
  var d=['','일','이','삼','사','오','육','칠','팔','구'];
  var u=['','만','억','조'];
  var res='', ui=0;
  while(n>0){
    var ch=n%10000;
    if(ch){
      var s='';
      var t=Math.floor(ch/1000), h=Math.floor((ch%1000)/100), ten=Math.floor((ch%100)/10), one=ch%10;
      if(t) s+=(t>1?d[t]:'')+'천';
      if(h) s+=(h>1?d[h]:'')+'백';
      if(ten) s+=(ten>1?d[ten]:'')+'십';
      if(one) s+=d[one];
      res=s+u[ui]+res;
    }
    n=Math.floor(n/10000); ui++;
  }
  return res+'원정';
}

// PDF
function dlPDF(){
  var prev=document.getElementById('qPDF');
  if(!prev) return;
  autoSave();
  var btn=document.getElementById('pdfBtn');
  btn.disabled=true; btn.textContent='생성 중...';
  html2canvas(prev,{scale:2,useCORS:true,backgroundColor:'#ffffff',width:794,windowWidth:900}).then(function(canvas){
    var img=canvas.toDataURL('image/jpeg',1.0);
    var pdf=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var pw=pdf.internal.pageSize.getWidth();
    var ph=pdf.internal.pageSize.getHeight();
    var ratio=pw/canvas.width;
    var sh=canvas.height*ratio;
    if(sh<=ph){
      pdf.addImage(img,'JPEG',0,0,pw,sh);
    } else {
      var pgH=Math.floor(ph/ratio), y=0;
      while(y<canvas.height){
        var tc=document.createElement('canvas');
        tc.width=canvas.width;
        tc.height=Math.min(pgH,canvas.height-y);
        tc.getContext('2d').drawImage(canvas,0,-y);
        if(y>0) pdf.addPage();
        pdf.addImage(tc.toDataURL('image/jpeg',1.0),'JPEG',0,0,pw,tc.height*ratio);
        y+=pgH;
      }
    }
    var pdfBlob = pdf.output('blob');
    pdf.save(getFileName()+'.pdf');
    if (_gToken){
      gdriveSaveFile(pdfBlob, getFileName()+'.pdf', 'application/pdf');
      gdriveSaveJSON();
    }
    btn.disabled=false; btn.textContent='⬇ PDF 다운로드';
  }).catch(function(e){
    console.error(e);
    btn.disabled=false; btn.textContent='⬇ PDF 다운로드';
  });
}

      });
      html+='</div>';
    });
    html+='</div></div>';
  });
  cont.innerHTML=html;

  // 검색 중이면 모두 펼치기
  if(kw){
    document.querySelectorAll('.lgbody,.mbody').forEach(function(el){el.style.display='block';});
    document.querySelectorAll('[id$="_i"]').forEach(function(el){el.textContent='▲';});
  }
}

// 드라이브 JSON 목록 불러오기
var _driveFiles = [];
async function loadDriveList(){
  var status = document.getElementById('driveStatus');
  var list = document.getElementById('driveList');
  var search = document.getElementById('dsearch');
  if(!_gToken){
    status.style.display='block';
    status.textContent='☁️ 드라이브 연동 버튼을 먼저 눌러주세요';
    list.innerHTML=''; search.style.display='none';
    return;
  }
  status.style.display='block';
  status.textContent='불러오는 중...';
  list.innerHTML=''; search.style.display='none';
  try{
    // 견적서 모음 폴더 ID 찾기
    var quoteFolderId = await gdriveGetFolder('견적서 모음', DIAN_FOLDER_ID);
    // 전체 하위 JSON 파일 검색
    var q = "mimeType='application/json' and trashed=false and '"+quoteFolderId+"' in parents";
    // 담당자 폴더들 먼저 가져오기
    var fRes = await fetch(
      'https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent("mimeType='application/vnd.google-apps.folder' and '"+quoteFolderId+"' in parents and trashed=false")+
      '&fields=files(id,name)&supportsAllDrives=true&includeItemsFromAllDrives=true',
      {headers:{Authorization:'Bearer '+_gToken}}
    );
    var fData = await fRes.json();
    var staffFolders = fData.files||[];
    _driveFiles = [];
    // 각 담당자 폴더에서 JSON 파일 목록
    for(var i=0;i<staffFolders.length;i++){
      var sf = staffFolders[i];
      var jRes = await fetch(
        'https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent("mimeType='application/json' and '"+sf.id+"' in parents and trashed=false")+
        '&fields=files(id,name,modifiedTime)&orderBy=modifiedTime+desc&supportsAllDrives=true&includeItemsFromAllDrives=true',
        {headers:{Authorization:'Bearer '+_gToken}}
      );
      var jData = await jRes.json();
      (jData.files||[]).forEach(function(f){
        _driveFiles.push({id:f.id, name:f.name, staff:sf.name, modified:f.modifiedTime});
      });
    }
    _driveFiles.sort(function(a,b){return b.modified.localeCompare(a.modified);});
    if(_driveFiles.length===0){
      status.textContent='저장된 견적서 JSON이 없어요';
      return;
    }
    status.style.display='none';
    search.style.display='block';
    renderDriveList();
  }catch(e){
    console.error(e);
    status.textContent='오류: '+e.message;
  }
}

function renderDriveList(){
  var kw=(document.getElementById('dsearch').value||'').toUpperCase();
  var list=document.getElementById('driveList');
  var filtered=kw?_driveFiles.filter(function(f){return f.name.toUpperCase().includes(kw)||f.staff.toUpperCase().includes(kw);}):_driveFiles;
  if(!filtered.length){list.innerHTML='<div class="sempty">검색 결과가 없어요</div>';return;}
  // 담당자별 그룹
  var sg={};
  filtered.forEach(function(f){
    if(!sg[f.staff]) sg[f.staff]=[];
    sg[f.staff].push(f);
  });
  var html='';
  Object.keys(sg).forEach(function(st,si){
    var gid='dg'+si;
    html+='<div class="lgroup">';
    html+='<div class="lghead" onclick="togGrp(\''+gid+'\')"><span>'+st+'</span><span>'+sg[st].length+'건 <span id="'+gid+'_i">▼</span></span></div>';
    html+='<div class="lgbody" id="'+gid+'">';
    sg[st].forEach(function(f){
      var dt=f.modified?f.modified.substring(0,10):'';
      html+='<div class="gdrive-file">';
      html+='<div><div class="gfn">'+f.name.replace('.json','')+'</div><div class="gfd">'+dt+'</div></div>';
    html+='<button class="gdrive-load-btn" onclick="loadDriveFile(\''+f.id+'\')">불러오기</button>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  list.innerHTML=html;
  // 이벤트 등록
  list.querySelectorAll('.gdrive-load-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ loadDriveFile(this.getAttribute('data-fid')); });
  });
}

function filterDriveList(){renderDriveList();}

// 드라이브 JSON 파일 불러와서 폼에 적용
async function loadDriveFile(fileId){
  try{
    var res=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media&supportsAllDrives=true',
      {headers:{Authorization:'Bearer '+_gToken}});
    var q=await res.json();
    var d=q.data;
    document.getElementById('quoteDate').value=d.quoteDate||'';
    document.getElementById('clientName').value=d.clientName||'';
    document.getElementById('attn').value=d.attn||'';
    document.getElementById('clientTel').value=d.clientTel||'';
    document.getElementById('siteName').value=d.siteName||'';
    document.getElementById('remark').value=d.remark||'';
    if(d.rMode){
      _rMode=d.rMode;
      document.querySelectorAll('.rbtn').forEach(function(b){b.classList.remove('act');});
      var mmap={'none':'정리 없음','1000':'천원 단위','10000':'만원 단위','custom':'직접 입력'};
      document.querySelectorAll('.rbtn').forEach(function(b){if(b.textContent.trim()===mmap[d.rMode])b.classList.add('act');});
      document.getElementById('rcw').style.display=d.rMode==='custom'?'block':'none';
    }
    var cont=document.getElementById('items'); cont.innerHTML=''; _ic=0;
    (d.items||[]).forEach(function(it){
      addItem();
      var r=cont.lastElementChild, inp=r.querySelectorAll('input');
      if(inp[0]) inp[0].value=it.name||'';
      if(inp[1]) inp[1].value=it.color||'';
      if(inp[2]) inp[2].value=it.spec||'';
      if(inp[3]) inp[3].value=it.qty||'';
      if(inp[4]) inp[4].value=it.unit||'';
      if(inp[5]) inp[5].value=it.price||'';
      if(inp[6]) inp[6].value=it.remark||'';
    });
    calcTot(); closeLoad(); toast('드라이브에서 불러왔어요! ☁️');
  }catch(e){console.error(e);toast('불러오기 실패: '+e.message);}
}

// 토스트
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.opacity='1';
  setTimeout(function(){t.style.opacity='0';},2000);
}
